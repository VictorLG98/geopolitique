name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt ruff pytest pytest-cov httpx
        working-directory: backend

      - name: Ruff lint
        run: ruff check app/
        working-directory: backend

      - name: Tests
        run: pytest tests/ -v --cov=app --cov-report=term-missing
        working-directory: backend
        env:
          ADMIN_SECRET: test-secret

      - name: Security audit
        run: pip install pip-audit && pip-audit -r requirements.txt --ignore-vuln PYSEC-2024-48
        working-directory: backend

  # El despliegue lo gestiona Render de forma nativa: el Blueprint (render.yaml)
  # está conectado a GitHub y auto-despliega en cada push a main. Por eso aquí no
  # hay job de deploy — CI solo valida (lint + tests + audit).
