name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt ruff pytest pytest-cov httpx
        working-directory: backend

      - name: Ruff lint
        run: ruff check app/
        working-directory: backend

      - name: Tests
        run: pytest tests/ -v --cov=app --cov-report=term-missing
        working-directory: backend
        env:
          ADMIN_SECRET: test-secret

      - name: Security audit
        run: pip install pip-audit && pip-audit -r requirements.txt --ignore-vuln PYSEC-2024-48
        working-directory: backend

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_NAME }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
